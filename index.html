    <!-- ===================================
         SPLASH SCREEN LOGIC & ANIMATIONS
         =================================== -->
    <script>
        (function () {
            'use strict';

            const logo = '/images/thinkdrive-logo.png';

            function initSplash() {
                console.log('[Splash] Initializing...');
                
                // Shred the logo
                shredLogo();
                
                // Create floating particles
                createParticles();
                
                console.log('[Splash] Initialization complete');
            }

            function shredLogo() {
                const container = document.getElementById('logo-shreds');
                if (!container) return;

                const img = new Image();
                img.onload = function () {
                    console.log('[Splash] Logo loaded successfully');
                    createShreds(container, img);
                };
                img.onerror = function () {
                    console.warn('[Splash] Logo failed to load, using text fallback');
                    createTextShreds(container);
                };
                img.src = logo;
            }

            function createShreds(container, img) {
                const shredCount = 16;
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                
                canvas.width = img.width;
                canvas.height = img.height;
                ctx.drawImage(img, 0, 0);

                const shredWidth = img.width / shredCount;

                for (let i = 0; i < shredCount; i++) {
                    const shred = document.createElement('div');
                    shred.className = 'logo-shred';
                    
                    const shredCanvas = document.createElement('canvas');
                    shredCanvas.width = shredWidth;
                    shredCanvas.height = img.height;
                    
                    const shredCtx = shredCanvas.getContext('2d');
                    shredCtx.drawImage(
                        canvas,
                        i * shredWidth, 0, shredWidth, img.height,
                        0, 0, shredWidth, img.height
                    );

                    shred.appendChild(shredCanvas);
                    shred.style.cssText = `
                        position: absolute;
                        left: ${i * (200 / shredCount)}px;
                        top: 0;
                        width: ${200 / shredCount}px;
                        height: 200px;
                        transform: translateY(${Math.random() * 400 - 200}px) rotate(${Math.random() * 720 - 360}deg) scale(0.3);
                        opacity: 0;
                        filter: blur(4px);
                        animation: reformShred 1.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
                        animation-delay: ${i * 0.1}s;
                    `;

                    container.appendChild(shred);
                }
                
                console.log('[Splash] Created ' + shredCount + ' logo shreds');
            }

            function createTextShreds(container) {
                const text = 'TD';
                const letters = text.split();
                
                letters.forEach((letter, i) => {
                    const piece = document.createElement('div');
                    piece.className = 'logo-shred logo-shred-text';
                    piece.style.cssText = `
                        position: absolute;
                        width: 100px;
                        height: 200px;
                        left: ${i * 100}px;
                        top: 0;
                        display: flex;
                        align-items: center;
                        justify-content: center;
                        font-size: 6rem;
                        font-weight: 900;
                        font-family: 'Space Grotesk', sans-serif;
                        color: #D4AF37;
                        transform: translateY(${Math.random() * 400 - 200}px) rotate(${Math.random() * 720 - 360}deg) scale(0.3);
                        opacity: 0;
                        filter: blur(4px);
                        animation: reformShred 1.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
                        animation-delay: ${i * 0.3}s;
                    `;
                    piece.textContent = letter;
                    container.appendChild(piece);
                });
                
                console.log('[Splash] Used fallback text shreds');
            }

            function createParticles() {
                const particlesContainer = document.getElementById('particles');
                const particleCount = 30;
                
                for (let i = 0; i < particleCount; i++) {
                    const particle = document.createElement('div');
                    particle.className = 'particle';
                    
                    const size = Math.random() * 4 + 2;
                    const left = Math.random() * 100;
                    const delay = Math.random() * 5;
                    const duration = Math.random() * 10 + 10;
                    
                    particle.style.cssText = `
                        position: absolute;
                        width: ${size}px;
                        height: ${size}px;
                        background: rgba(212, 175, 55, ${Math.random() * 0.5 + 0.3});
                        border-radius: 50%;
                        left: ${left}%;
                        bottom: -10%;
                        animation: floatParticle ${duration}s ease-in-out ${delay}s infinite;
                    `;
                    
                    particlesContainer.appendChild(particle);
                }
            }

            // Initialize on DOM ready
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', initSplash);
            } else {
                initSplash();
            }
        })();
    </script>

    <!-- PWA INSTALL BANNER -->
    <div id="pwa-install-banner" class="pwa-install-banner">
        <div class="pwa-install-content">
            <div class="pwa-install-text">
                <h3>📱 Install ThinkDrive</h3>
                <p>Get the full app experience with offline access!</p>
            </div>
            <div class="pwa-install-actions">
                <button id="pwa-install-btn" class="pwa-install-btn pwa-install-btn-primary">Install</button>
                <button id="pwa-dismiss-btn" class="pwa-install-btn pwa-install-btn-secondary">Later</button>
            </div>
        </div>
    </div>

    <!-- PWA INSTALL PROMPT HANDLER -->
    <script>
        let deferredPrompt;
        const installBanner = document.getElementById('pwa-install-banner');
        const installBtn = document.getElementById('pwa-install-btn');
        const dismissBtn = document.getElementById('pwa-dismiss-btn');

        // Capture the install prompt event
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;

            // Don't show if already dismissed or installed
            if (!localStorage.getItem('pwa-install-dismissed') && !window.matchMedia('(display-mode: standalone)').matches) {
                setTimeout(() => {
                    installBanner.style.display = 'block';
                }, 3000);
            }
        });

        // Handle install button click
        installBtn.addEventListener('click', async () => {
            if (!deferredPrompt) return;

            deferredPrompt.prompt();
            const { outcome } = await deferredPrompt.userChoice;

            console.log(`PWA install outcome: ${outcome}`);
            deferredPrompt = null;
            installBanner.style.display = 'none';
        });

        // Handle dismiss button click
        dismissBtn.addEventListener('click', () => {
            installBanner.style.display = 'none';
            localStorage.setItem('pwa-install-dismissed', Date.now());
        });

        // Check if already installed
        window.addEventListener('appinstalled', () => {
            console.log('ThinkDrive PWA installed successfully!');
            installBanner.style.display = 'none';
            localStorage.setItem('pwa-installed', 'true');
        });

        // Register service worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/service-worker.js').then(reg => {
                console.log('[PWA] Service worker registered:', reg.scope);

                // Check for updates periodically
                setInterval(() => {
                    reg.update();
                }, 60000); // Check every minute
            }).catch(err => {
                console.error('[PWA] Service worker registration failed:', err);
            });
        }
    </script>
